<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Purple Patch Farms Admin</title>
  <meta name="description" content="Purple Patch Farms — admin console." />
  <meta name="theme-color" content="#6B1170" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PPF Admin" />
  <link rel="icon" type="image/png" href="https://ppf.emrid.store/files/172355246554z5jjLtKL.png" />
  <link rel="apple-touch-icon" href="https://ppf.emrid.store/files/172355246554z5jjLtKL.png" />
  <script type="module" crossorigin src="/assets/ppf/admin/assets/index-xFj_C-rA.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/ppf/admin/assets/index-BUzuogPy.css">
<link rel="manifest" href="/assets/ppf/admin/manifest.webmanifest"></head>

<body>
  <div id="root">
    <div id="ppf-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
      <img src="https://ppf.emrid.store/files/172355246554z5jjLtKL.png" alt="" style="width:72px;height:72px;border-radius:50%;object-fit:contain" />
      <div style="width:26px;height:26px;border:3px solid #E8D5EE;border-top-color:#6B1170;border-radius:50%;animation:ppfspin 0.8s linear infinite"></div>
    </div>
  </div>
  <style>@keyframes ppfspin{to{transform:rotate(360deg)}}</style>
  <script>
    window.csrf_token = '{{ csrf_token }}';
    if (!window.frappe) window.frappe = {};
    try { window.frappe.boot = JSON.parse({{ boot }}); } catch (e) { window.frappe.boot = {}; }
    window.ppfShowError = function (msg) {
      var r = document.getElementById('root');
      if (r) r.innerHTML = '<div style="padding:24px;font-family:sans-serif;text-align:center"><h2 style="color:#1A1A1A">Could not load the app</h2><p style="color:#777">Close and reopen, or clear the app and retry.</p><pre style="white-space:pre-wrap;color:#E0504F;font-size:12px;text-align:left;background:#f5f5f5;padding:12px;border-radius:8px">' + msg + '</pre></div>';
    };
    window.addEventListener('error', function (e) {
      if (e && e.message && /Unexpected|import|module|chunk/i.test(e.message)) window.ppfShowError(e.message);
    });
    setTimeout(function () {
      if (document.getElementById('ppf-splash')) window.ppfShowError('The app did not start. Please reload.');
    }, 30000);
  </script>
</body>

</html>
